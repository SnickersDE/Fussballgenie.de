<header>
  <div class="header-top">
    <div>
      <a class="logo" href="{{ .Site.Home.RelPermalink }}" onclick="window.location.href='{{ .Site.Home.RelPermalink }}'; return false;">
        FUSSBALLGENIE<span class="accent">.DE</span>
      </a>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="Suche..."/>
        <button class="search-btn" onclick="toggleSearch()">&#128269; Suche</button>
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="header-meta">
        <span id="headerDate"></span>
      </div>
    </div>
  </div>

  <nav id="mainNav">
    <div class="nav-inner">
      <div class="nav-left">

        <div class="nav-item">
          <a class="nav-btn{{ if .IsHome }} active{{ end }}" href="{{ .Site.Home.RelPermalink }}">
            Start
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/tabelle/" }} active{{ end }}" href="{{ "tabelle/" | relURL }}">
            Tabelle
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/champions-league/" }} active{{ end }}" href="{{ "champions-league/" | relURL }}">
            Champions League
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/1-bundesliga/" }} active{{ end }}" href="{{ "1-bundesliga/" | relURL }}">
            1. Bundesliga
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/2-bundesliga/" }} active{{ end }}" href="{{ "2-bundesliga/" | relURL }}">
            2. Bundesliga
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/historisches/" }} active{{ end }}" href="{{ "historisches/" | relURL }}">
            Historisches
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/unterstuetzen/" }} active{{ end }}" href="{{ "unterstuetzen/" | relURL }}">
            Unterstützen
          </a>
        </div>
        <div class="nav-item">
          <a class="nav-btn{{ if eq .RelPermalink "/wir/" }} active{{ end }}" href="{{ "wir/" | relURL }}">
            Wir
          </a>
        </div>

      </div>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="{{ .Site.Home.RelPermalink }}">Start</a>
    <a href="{{ "tabelle/" | relURL }}">Tabelle</a>
    <a href="{{ "champions-league/" | relURL }}">Champions League</a>
    <a href="{{ "1-bundesliga/" | relURL }}">1. Bundesliga</a>
    <a href="{{ "2-bundesliga/" | relURL }}">2. Bundesliga</a>
    <a href="{{ "historisches/" | relURL }}">Historisches</a>
    <a href="{{ "unterstuetzen/" | relURL }}">Unterstützen</a>
    <a href="{{ "wir/" | relURL }}">Wir</a>
  </div>
</header>
